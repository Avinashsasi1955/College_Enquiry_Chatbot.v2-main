<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Manage FAQs</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2>Manage FAQs</h2>
    <table class="table table-bordered">
        <tr>
            <th>ID</th>
            <th>Question</th>
            <th>Answer</th>
        </tr>
        {% for faq in faqs %}
        <tr>
            <td>{{ faq.faq_id }}</td>
            <td>{{ faq.question }}</td>
            <td>{{ faq.answer }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
</body>
</html>
