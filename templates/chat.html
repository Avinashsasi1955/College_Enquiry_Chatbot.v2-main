<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>College Chatbot</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand">Welcome, {{ username }}</span>
    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container-fluid mt-3">
  <div class="row">
    <!-- Sidebar -->
    <div class="col-md-3 bg-light p-3 border-end collapse show" id="sidebar">
      <h5>Chat History</h5>
      <small class="text-muted">Coming soon...</small>
    </div>

    <!-- Chat Area -->
    <div class="col-md-9">
      <div id="chat-box" class="chat-box border p-3 mb-2"></div>
      <div class="input-group">
        <input id="user-input" type="text" class="form-control" placeholder="Ask me something...">
        <button id="send-btn" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
