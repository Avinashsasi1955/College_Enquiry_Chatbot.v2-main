<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary">
  <div class="container-fluid">
    <span class="navbar-brand mb-0 h1">Admin Dashboard</span>
    <a href="/logout" class="btn btn-light btn-sm">Logout</a>
  </div>
</nav>

<div class="container mt-4">
  <h4>Manage FAQs</h4>

  <form method="POST" action="/admin/add_faq" class="row g-3 mb-4">
    <div class="col-md-3">
      <input type="text" name="question" placeholder="Question" class="form-control" required>
    </div>
    <div class="col-md-3">
      <input type="text" name="answer" placeholder="Answer" class="form-control" required>
    </div>
    <div class="col-md-2">
      <input type="text" name="category" placeholder="Category" class="form-control">
    </div>
    <div class="col-md-2">
      <input type="text" name="keywords" placeholder="Keywords" class="form-control">
    </div>
    <div class="col-md-2">
      <button class="btn btn-success w-100">Add FAQ</button>
    </div>
  </form>

  <table class="table table-bordered table-striped">
    <thead class="table-primary">
      <tr>
        <th>ID</th>
        <th>Question</th>
        <th>Answer</th>
        <th>Category</th>
        <th>Keywords</th>
      </tr>
    </thead>
    <tbody>
      {% for faq in faqs %}
      <tr>
        <td>{{ faq.faq_id }}</td>
        <td>{{ faq.question }}</td>
        <td>{{ faq.answer }}</td>
        <td>{{ faq.category }}</td>
        <td>{{ faq.keywords }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

</body>
</html>
