<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | College Enquiry Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow-lg" style="width: 28rem;">
    <h3 class="text-center mb-3">Create an Account</h3>
    <form method="POST">
        <input type="text" class="form-control mb-3" name="username" placeholder="Username" required>
        <input type="email" class="form-control mb-3" name="email" placeholder="Email" required>
        <input type="password" class="form-control mb-3" name="password" placeholder="Password" required>
        <button type="submit" class="btn btn-success w-100">Register</button>
        <p class="text-center mt-3">Already have an account? <a href="/login">Login</a></p>
    </form>
</div>

</body>
</html>
