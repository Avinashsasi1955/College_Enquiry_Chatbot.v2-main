<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | College Enquiry Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .login-card {
            width: 25rem;
            min-height: 25rem;
        }
        .card-footer-links a {
            margin: 0 0.5rem;
        }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow-lg login-card d-flex flex-column justify-content-between">
    <div>
        <h3 class="text-center mb-3">User Login</h3>
        {% if error %}
            <div class="alert alert-danger text-center">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <input type="text" class="form-control mb-3" name="username" placeholder="Username" required>
            <input type="password" class="form-control mb-3" name="password" placeholder="Password" required>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
    
    <div class="card-footer-links text-center mt-3">
        <p class="mb-1">Don't have an account? <a href="/register">Register</a></p>
        <p class="mb-0"><a href="/admin">Admin Login</a></p>
    </div>
</div>

</body>
</html>
